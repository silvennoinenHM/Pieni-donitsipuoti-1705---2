<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pieni Donitsipuoti</title>

  <!-- Bootstrap jotta hamburger toimii -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body class="etusivu">

<header class="header">
  <nav class="navbar">
    <ul>
      <li><a href="index.html">Etusivu</a></li>
      <li><a href="about.html">Keitä me olemme</a></li>
      <li><a href="gallery.html">Galleria</a></li>
      <li><a href="contact.html">Ota yhteyttä</a></li>
    </ul>
  </nav>
</header>

<!-- DONITSISADE (TAUSTALLA) -->
<div id="donitsi-container"></div>

<div class="title-wrapper">
  <svg viewBox="0 0 500 200" class="arc-title">
    <path id="curve" d="M 50 150 Q 250 10 450 150" fill="transparent"/>
    <text width="500">
      <textPath href="#curve" startOffset="50%" text-anchor="middle">
        Pieni Donitsipuoti
      </textPath>
    </text>
  </svg>
</div>

<img src="back-view-girl-dress-with-bow-her-hair-gray-background.jpg" 
     class="hero-img" 
     alt="Hero-kuva">

<p class="hero-subtitle">Käsintehtyjä hiusdonitseja rakkaudella</p>

<a href="gallery.html" class="hero-btn">Tutustu tuotteisiin</a>

<footer class="footer">
  <p>Pieni Donitsipuoti © 2024</p>
</footer>

<script>
  const scrunchies = [
    "Scrunchie1.png",
    "Scrunchie2.png",
    "Scrunchie3.png",
    "Scrunchie4.png"
  ];

  if (document.body.classList.contains("etusivu")) {
    for (let i = 0; i < 50; i++) {
      let d = document.createElement("img");
      d.src = scrunchies[Math.floor(Math.random() * scrunchies.length)];
      d.className = "donitsi-fall";

      d.style.left = Math.random() * 100 + "vw";
      d.style.animationDuration = (4 + Math.random() * 6) + "s";
      d.style.width = "40px";

      document.getElementById("donitsi-container").appendChild(d);
    }
  }
</script>

<!-- Bootstrap JS hamburgerille -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
